<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tzad Store</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="modal/modal.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
</head>
<body>

<header class="topo">
  <button class="menu-icon" aria-label="Menu">☰</button>
  <img src="img/topo.png" alt="Tzad Store" class="logo">
  <button class="cart-icon" aria-label="Carrinho">
    <img src="img/carrinho.png" alt="Carrinho">
  </button>
</header>

<div class="main-content">
  <section class="banner">
    <img src="img/banner.gif" alt="Banner animado">
  </section>

  <section class="produtos">
    <div class="cabecalho-produtos">
      <div class="textos-produtos">
        <h2 contenteditable="true">BEM VINDO A TZAD STORE</h2>
        <p contenteditable="true">Sua loja de REPS com o melhor preço e a melhor qualidade.</p>
      </div>
      <div class="redes-produtos">
        <a href="https://instagram.com/SEUUSUARIO" target="_blank"><img src="img/instagram.png" alt="Instagram"></a>
        <a href="https://tiktok.com/@SEUUSUARIO" target="_blank"><img src="img/tiktok.png" alt="TikTok"></a>
      </div>
    </div>
  </section>

  <section class="colecao">
    <h2 class="titulo-colecao">Promoções</h2>
    <div class="categoria">
      <div class="produtos" id="vitrine-promocoes"></div>
      <button class="ver-todos" onclick="irParaSubpagina('promocoes')">Ver todos</button>
    </div>
  </section>

  <section class="colecao">
    <h2 class="titulo-colecao">Nocta</h2>
    <section class="video-loja">
      <video controls width="900">
        <source src="video/noctanv.mp4" type="video/mp4">
      </video>
    </section>
    <div class="categoria">
      <div class="produtos" id="vitrine-nocta"></div>
      <button class="ver-todos" onclick="irParaSubpagina('nocta')">Ver todos produtos nocta</button>
    </div>
  </section>

  <section class="colecao">
    <h2 class="titulo-colecao">Camisetas Stüssy</h2>
    <h3 class="categoria-titulo">Promoções Progressivas Ativas</h3>
    <div class="categoria">
      <div class="produtos" id="vitrine-stussy"></div>
      <button class="ver-todos" onclick="irParaSubpagina('stussy')">Ver todos</button>
    </div>
  </section>

</div>

<script src="shop.js"></script>
<script src="js/script.js"></script>
</body>
</html>
