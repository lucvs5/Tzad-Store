<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tzad Store - Oficial</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="topo">
        <button class="menu-icon" aria-label="Menu">☰</button>
        
        <img src="img/topo.png" alt="Tzad Store" class="logo">
        
        <button class="cart-icon" aria-label="Carrinho" type="button">
            <img src="img/carrinho.png" alt="Carrinho" onclick="abrirCarrinho()">
        </button>
    </header>

    <main class="container">
        <div class="product-grid" id="product-grid">
            </div>
    </main>

    <div id="login-window" class="login-window">
        <div class="login-header">
            <span>LOGIN / CARRINHO</span>
            <button class="minimize-btn" onclick="fecharCarrinho()">_</button>
        </div>
        <div class="login-body">
            <form class="login-form">
                <label>E-mail</label>
                <input type="email" placeholder="Digite seu e-mail" required>
                <label>Senha</label>
                <input type="password" placeholder="Digite sua senha" required>
                <button type="submit" class="login-button">Login</button>
            </form>
            <div class="links">
                <a href="#">Criar conta</a>
                <a href="#">Esqueceu a senha?</a>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="product-modal">
        <div class="modal-content">
            <button class="close-modal" onclick="fecharModal()">&times;</button>
            <div id="modal-body">
                </div>
        </div>
    </div>

    <footer class="rodape">
        <p>&copy; 2024 Tzad Store. Todos os direitos reservados.</p>
    </footer>

    <script src="js/script.js"></script>
    <script src="js/shop.js"></script>
    <script src="frontend/modal.js"></script>

</body>
</html>
