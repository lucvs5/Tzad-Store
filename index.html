<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tzad Store</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
</head>
<body>

<header class="topo">
    <button class="menu-icon" aria-label="Menu">☰</button>
    <img src="img/topo.png" alt="Tzad Store" class="logo">
    
    <button class="cart-icon" style="cursor: pointer; background: none; border: none;" type="button" onclick="abrirCarrinho()">
        <img src="img/carrinho.png" alt="Carrinho" style="height: 35px;">
    </button>
</header>

<div class="main-content">
    <section class="banner">
        <img src="img/banner.gif" alt="Banner animado" style="width: 100%;">
    </section>

    <section class="cabecalho-produtos">
        <div class="textos-produtos">
            <h2>BEM VINDO A TZAD STORE</h2>
            <p>Sua loja de REPS com o melhor preço e a melhor qualidade.</p>
        </div>
    </section>

    <section class="colecao">
        <h2 class="titulo-colecao">Promoções</h2>
        <div class="categoria"> 
            <div class="produtos" id="vitrine-promocoes"></div>
        </div>
    </section>

    <section class="colecao">
        <h2 class="titulo-colecao">Nocta</h2>
        <div class="categoria">
            <div class="produtos" id="vitrine-nocta"></div>
        </div>
    </section>
</div>

<div id="login-window" class="login-window" style="display: none;">
    <div class="login-header">
        <span>LOGIN / CARRINHO</span>
        <button class="minimize-btn" onclick="fecharCarrinho()">_</button>
    </div>
    <div class="login-body">
        <form class="login-form">
            <input type="email" placeholder="E-mail" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit" class="login-button">Login</button>
        </form>
    </div>
</div>
    
<script src="js/script.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
