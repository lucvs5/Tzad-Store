<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tzad Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
</head>
<body>

<!-- ========================
       TOPO FIXO
======================== -->
<header class="topo">

  <!-- MENU HAMBÚRGUER -->
  <button class="menu-icon" aria-label="Menu">☰</button>

  <!-- LOGO CENTRAL -->
  <img src="img/topo.png" alt="Tzad Store" class="logo">

  <!-- CARRINHO -->
  <a href="#" class="cart-icon" aria-label="Carrinho">
    <img src="img/carrinho.png" alt="Carrinho">
  </a>

</header>

<!-- ========================
       CONTEÚDO DA PÁGINA
======================== -->
<main>
  <section class="banner">
    <img src="img/banner.jpg" alt="Banner">
  </section>

  <section class="produtos">
    <h2>Novidades</h2>
    <div class="grid-produtos">
      <!-- Produtos vão aqui -->
    </div>
  </section>
</main>

<!-- JANELA DE LOGIN -->
<div id="login-window" class="login-window">

  <div class="login-header">
    <span>Bem Vindo a Tzad Store</span>
    <button class="minimize-btn" aria-label="Minimizar">—</button>
  </div>

  <div class="login-body">
    <form class="login-form">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="Digite seu e-mail" required>

      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha" required>

      <div class="links">
        <a href="#">Recuperar senha</a>
        <a href="#">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="login-button">Login</button>
    </form>
  </div>

</div>
