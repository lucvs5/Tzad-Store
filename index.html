<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tzad Store</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>
  
<header class="topo">

  <!-- MENU HAMBÚRGUER -->
  <button class="menu-icon" aria-label="Menu">☰</button>

  <!-- LOGO + CARRINHO (imagem única) -->
  <div class="logo-com-cart">
    <img src="img/logo-com-cart.png" alt="Tzad Store" class="logo">
    <!-- Botão invisível sobre o carrinho -->
    <button class="cart-button" aria-label="Carrinho"></button>
  </div>

</header>

<section class="banner">
  <img src="img/banner.jpg" alt="Banner">
</section>

<section class="produtos">
  <h2>Novidades</h2>
  <div class="grid-produtos">
    <!-- Produtos aqui -->
  </div>
</section>

<script src="js/script.js"></script>

</body>
</html>
