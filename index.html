<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tzad Store</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">
</head>
<body>

<!-- ========================
       TOPO FIXO
======================== -->
<header class="topo">
  <button class="menu-icon" aria-label="Menu">☰</button>
  <img src="img/topo.png" alt="Tzad Store" class="logo">
  <button class="cart-icon" aria-label="Carrinho" onclick="openCart()">
    <img src="img/carrinho.png" alt="Carrinho">
  </button>
</header>

<!-- ========================
       CONTEÚDO PRINCIPAL
======================== -->
<div class="main-content">

  <section class="banner">
    <img src="img/banner.gif" alt="Banner animado">
  </section>

  <section class="produtos">
    <div class="cabecalho-produtos">
      <div class="textos-produtos">
        <h2 contenteditable="true">BEM VINDO A TZAD STORE</h2>
        <p contenteditable="true">Sua loja de REPS com o melhor preço e a melhor qualidade.</p>
      </div>

      <div class="redes-produtos">
        <a href="https://instagram.com/SEUUSUARIO" target="_blank">
          <img src="img/instagram.png" alt="Instagram">
        </a>
        <a href="https://tiktok.com/@SEUUSUARIO" target="_blank">
          <img src="img/tiktok.png" alt="TikTok">
        </a>
      </div>
    </div>

    <div class="grid-produtos">
      <!-- Exemplo de produto -->
      <div class="produto">
        <img src="img/cjbl.jpg" alt="Conjunto BAPE Laranja">
        <h4>R$250,00</h4>
        <p>Conjunto BAPE Laranja</p>
        <button onclick="addToCart('Conjunto BAPE Laranja',250,'img/cjbl.jpg')">Adicionar ao carrinho</button>
      </div>

      <div class="produto">
        <img src="img/ColarImperial.jpg" alt="Colar Imperial">
        <h4>R$150,00</h4>
        <p>Colar Imperial</p>
        <button onclick="addToCart('Colar Imperial',150,'img/ColarImperial.jpg')">Adicionar ao carrinho</button>
      </div>

      <!-- Mais produtos podem ser duplicados seguindo este padrão -->
    </div>
  </section>

</div>

<!-- ========================
       MODAL DO CARRINHO
======================== -->
<div id="cartModal">
  <div class="modalBox">
    <h2>Seu Carrinho</h2>
    <button class="closeBtn" onclick="closeCart()">×</button>
    <div id="cartItems">
      <!-- Itens adicionados via JS aparecerão aqui -->
    </div>
    <div id="cartTotal">Total: R$0,00</div>
  </div>
</div>

<!-- ========================
       JANELA DE LOGIN
======================== -->
<div id="login-window" class="login-window">
  <div class="login-header">
    <span>Bem Vindo a Tzad Store</span>
    <button class="minimize-btn" aria-label="Minimizar">—</button>
  </div>
  <div class="login-body">
    <form class="login-form">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="Digite seu e-mail" required>

      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha" required>

      <div class="links">
        <a href="#">Recuperar senha</a>
        <a href="#">Esqueceu a senha?</a>
      </div>

      <button type="submit" class="login-button">Login</button>
    </form>
  </div>
</div>

<!-- ========================
       SCRIPTS
======================== -->
<script src="modal/modal.js"></script>
<script src="js/shop.js"></script>

</body>
</html>
